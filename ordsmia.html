<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ordsmia ⚒️ — Smi ordene riktig!</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#FFF8F0;color:#1a1a1a;overflow-x:hidden;min-height:100vh}
button,a{font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
button{cursor:pointer;border:none;outline:none}

/* Animations */
@keyframes pop-in{0%{transform:scale(0);opacity:0}60%{transform:scale(1.12);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes slide-up{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(8px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 8px rgba(180,83,9,0.3)}50%{box-shadow:0 0 20px rgba(180,83,9,0.6)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes star-pop{0%{transform:scale(0) rotate(-90deg);opacity:0}60%{transform:scale(1.3) rotate(10deg);opacity:1}100%{transform:scale(1) rotate(0deg);opacity:1}}

.anim-pop{animation:pop-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both}
.anim-slide{animation:slide-up 0.4s ease both}

/* Layout */
.container{max-width:680px;margin:0 auto;padding:16px;min-height:100vh;display:flex;flex-direction:column}

/* Title */
.title-text{font-family:'Fredoka One',cursive;font-size:clamp(32px,8vw,48px);color:#B45309;text-align:center;text-shadow:2px 2px 0 rgba(180,83,9,0.15)}
.subtitle{font-size:clamp(14px,3.5vw,18px);color:#92400E;text-align:center;font-weight:700;margin-top:2px}

/* Progress bar */
.progress-wrap{background:#FEF3C7;border-radius:12px;padding:12px 16px;margin:16px 0;border:2px solid rgba(245,158,11,0.2)}
.progress-label{font-size:13px;font-weight:700;color:#92400E;margin-bottom:6px;display:flex;justify-content:space-between}
.progress-bar-bg{background:#fff;border-radius:8px;height:14px;overflow:hidden;border:1px solid rgba(245,158,11,0.25)}
.progress-bar-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#F59E0B,#B45309);transition:width 0.6s ease}

/* Mode cards */
.mode-grid{display:grid;gap:12px;margin:12px 0}
.mode-card{background:#fff;border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px;border:2px solid rgba(245,158,11,0.2);transition:all 0.2s;touch-action:manipulation;cursor:pointer;text-align:left}
.mode-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(180,83,9,0.12);border-color:#B45309}
.mode-card:active{transform:scale(0.97)}
.mode-icon{font-size:clamp(28px,7vw,36px);width:52px;height:52px;display:flex;align-items:center;justify-content:center;background:#FEF3C7;border-radius:14px;flex-shrink:0}
.mode-info{flex:1;min-width:0}
.mode-name{font-weight:800;font-size:clamp(14px,3.5vw,16px);color:#92400E}
.mode-desc{font-size:clamp(11px,2.8vw,13px);color:#78716C;margin-top:2px;line-height:1.3}
.mode-stars{display:flex;gap:2px;margin-top:4px}
.mode-stars .star{font-size:16px;opacity:0.25}
.mode-stars .star.earned{opacity:1}

/* Sound toggle */
.sound-btn{position:fixed;bottom:16px;right:16px;width:48px;height:48px;border-radius:50%;background:#fff;border:2px solid rgba(245,158,11,0.2);font-size:22px;display:flex;align-items:center;justify-content:center;z-index:100;touch-action:manipulation;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.sound-btn:active{transform:scale(0.9)}

/* Game header */
.game-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:12px}
.back-btn{background:none;font-size:clamp(14px,3.5vw,16px);color:#B45309;font-weight:700;display:flex;align-items:center;gap:4px;touch-action:manipulation;padding:8px 12px;border-radius:10px}
.back-btn:hover{background:#FEF3C7}
.round-label{font-size:clamp(13px,3.2vw,15px);font-weight:700;color:#92400E;background:#FEF3C7;padding:4px 12px;border-radius:8px}
.score-label{font-size:clamp(13px,3.2vw,15px);font-weight:700;color:#16A34A}

/* Round progress dots */
.round-dots{display:flex;justify-content:center;gap:6px;margin-bottom:16px}
.round-dot{width:clamp(8px,2vw,10px);height:clamp(8px,2vw,10px);border-radius:50%;background:#E5E7EB;transition:all 0.3s}
.round-dot.correct{background:#16A34A}
.round-dot.wrong{background:#DC2626}
.round-dot.current{background:#F59E0B;animation:glow-pulse 1.5s ease-in-out infinite}

/* Question area */
.question-area{background:#fff;border-radius:20px;padding:clamp(20px,5vw,32px);border:2px solid rgba(245,158,11,0.2);margin-bottom:16px;text-align:center}
.question-word{font-family:'Fredoka One',cursive;font-size:clamp(28px,7vw,42px);color:#B45309;margin-bottom:8px;line-height:1.2}
.question-sub{font-size:clamp(13px,3.2vw,15px);color:#78716C;font-weight:600}
.question-hint{font-size:clamp(12px,3vw,14px);color:#7C3AED;font-weight:600;margin-top:8px}

/* Option buttons */
.options{display:grid;gap:10px;margin-top:12px}
.options.cols-2{grid-template-columns:1fr 1fr}
.options.cols-3{grid-template-columns:1fr 1fr 1fr}
.opt-btn{background:#fff;border:2px solid #E5E7EB;border-radius:14px;padding:clamp(12px,3vw,16px) clamp(14px,3.5vw,20px);font-size:clamp(14px,3.5vw,17px);font-weight:700;color:#1a1a1a;transition:all 0.2s;touch-action:manipulation;position:relative;overflow:hidden}
.opt-btn:hover{border-color:#B45309;background:#FEF3C7}
.opt-btn:active{transform:scale(0.96)}
.opt-btn.correct{background:#16A34A;color:#fff;border-color:#16A34A;animation:pop-in 0.3s ease}
.opt-btn.wrong{background:#DC2626;color:#fff;border-color:#DC2626;animation:shake 0.4s ease}
.opt-btn.disabled{pointer-events:none;opacity:0.7}
.opt-btn.reveal{border-color:#16A34A;background:#DCFCE7;color:#16A34A}

/* Compound words mode */
.compound-area{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.compound-col{display:flex;flex-direction:column;gap:8px}
.compound-col-label{font-size:12px;font-weight:800;color:#92400E;text-transform:uppercase;text-align:center;letter-spacing:1px}
.cw-btn{background:#fff;border:2px solid #E5E7EB;border-radius:12px;padding:clamp(10px,2.5vw,14px);font-size:clamp(14px,3.5vw,17px);font-weight:700;color:#1a1a1a;transition:all 0.2s;touch-action:manipulation}
.cw-btn:hover{border-color:#B45309}
.cw-btn:active{transform:scale(0.96)}
.cw-btn.selected{background:#B45309;color:#fff;border-color:#B45309}
.cw-btn.matched{background:#DCFCE7;color:#16A34A;border-color:#16A34A;pointer-events:none}
.cw-btn.wrong-match{animation:shake 0.4s ease}

/* Forge result */
.forge-result{display:flex;align-items:center;justify-content:center;gap:4px;margin:12px 0;min-height:40px;flex-wrap:wrap}
.forge-word{font-family:'Fredoka One',cursive;font-size:clamp(16px,4vw,22px);color:#16A34A;animation:pop-in 0.5s ease;margin:2px 6px}

/* Result screen */
.result-screen{text-align:center;padding:20px 0}
.result-emoji{font-size:clamp(56px,14vw,72px);margin-bottom:12px;animation:float 3s ease-in-out infinite}
.result-title{font-family:'Fredoka One',cursive;font-size:clamp(24px,6vw,34px);color:#B45309;margin-bottom:8px}
.result-score{font-size:clamp(16px,4vw,20px);color:#92400E;font-weight:700;margin-bottom:16px}
.result-stars{display:flex;justify-content:center;gap:8px;margin-bottom:20px}
.result-stars .star{font-size:clamp(32px,8vw,44px)}
.result-stars .star.earned{animation:star-pop 0.5s ease both}
.result-stars .star:nth-child(2).earned{animation-delay:0.15s}
.result-stars .star:nth-child(3).earned{animation-delay:0.3s}
.result-fact{background:#FEF3C7;border-radius:14px;padding:16px;font-size:clamp(13px,3.2vw,15px);color:#92400E;line-height:1.5;margin-bottom:20px;border:1px solid rgba(245,158,11,0.2)}
.result-fact b{color:#B45309}
.result-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.res-btn{border-radius:14px;padding:14px 28px;font-size:clamp(14px,3.5vw,16px);font-weight:800;transition:all 0.2s;touch-action:manipulation}
.res-btn:active{transform:scale(0.95)}
.res-btn.primary{background:#B45309;color:#fff}
.res-btn.primary:hover{background:#92400E}
.res-btn.secondary{background:#FEF3C7;color:#92400E;border:2px solid rgba(245,158,11,0.25)}
.res-btn.secondary:hover{background:#FDE68A}

/* Footer */
.footer{margin-top:auto;padding:20px 0 60px;text-align:center;font-size:clamp(11px,2.8vw,13px);color:#A8A29E;line-height:1.6}
.footer a{color:#B45309;text-decoration:none;font-weight:700;touch-action:manipulation}
.footer a:hover{text-decoration:underline}

/* Responsive */
@media(max-width:400px){
  .container{padding:10px}
  .mode-card{padding:12px;gap:10px}
  .mode-icon{width:44px;height:44px;font-size:24px}
}
@media(min-width:768px){
  .mode-grid{grid-template-columns:1fr 1fr}
  .mode-grid .mode-card:last-child{grid-column:1/-1;max-width:50%;justify-self:center;width:100%}
}
</style>
</head>

<script>
/* ─── Audio Engine ─── */
var SoundEngine = (function(){
  var ctx = null, enabled = true;
  function getCtx(){
    if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  function beep(freq, dur, type, vol){
    if(!enabled) return;
    try{
      var c = getCtx(), o = c.createOscillator(), g = c.createGain();
      o.type = type || 'sine'; o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.12, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(g); g.connect(c.destination);
      o.start(); o.stop(c.currentTime + dur);
    }catch(e){}
  }
  return {
    click: function(){ beep(800, 0.08, 'sine', 0.08); },
    correct: function(){
      beep(523, 0.12, 'sine', 0.10);
      setTimeout(function(){beep(659, 0.12, 'sine', 0.10);}, 80);
      setTimeout(function(){beep(784, 0.18, 'sine', 0.12);}, 160);
    },
    wrong: function(){
      beep(250, 0.15, 'sawtooth', 0.08);
      setTimeout(function(){beep(200, 0.25, 'sawtooth', 0.08);}, 120);
    },
    fanfare: function(){
      var freqs = [523,659,784,1047];
      for(var i = 0; i < freqs.length; i++){
        (function(f, idx){ setTimeout(function(){beep(f, 0.25, 'sine', 0.10);}, idx * 120); })(freqs[i], i);
      }
    },
    forge: function(){
      beep(300, 0.06, 'triangle', 0.08);
      setTimeout(function(){beep(600, 0.1, 'sine', 0.06);}, 60);
    },
    toggle: function(){ enabled = !enabled; return enabled; },
    isOn: function(){ return enabled; },
    warmup: function(){ try{ getCtx(); }catch(e){} }
  };
})();

/* Sound button */
var soundBtn = document.getElementById('soundToggle');
soundBtn.addEventListener('click', function(){
  var on = SoundEngine.toggle();
  soundBtn.textContent = on ? '🔊' : '🔇';
  if(on) SoundEngine.click();
});
document.addEventListener('touchstart', function(){ SoundEngine.warmup(); }, {once: true});
document.addEventListener('click', function(){ SoundEngine.warmup(); }, {once: true});

/* ─── Fisher-Yates Shuffle ─── */
function shuf(a){
  var c = a.slice();
  for(var i = c.length - 1; i > 0; i--){
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = c[i]; c[i] = c[j]; c[j] = tmp;
  }
  return c;
}
function pick(arr, n){ return shuf(arr).slice(0, n); }

/* ─── LocalStorage Stars ─── */
function getStars(mode){ return parseInt(localStorage.getItem('ordsmia_' + mode) || '0'); }
function setStars(mode, s){
  var cur = getStars(mode);
  if(s > cur) localStorage.setItem('ordsmia_' + mode, String(s));
}
function totalStars(){
  var s = 0;
  for(var m = 1; m <= 5; m++) s += getStars(m);
  return s;
}

/* ─── Rendering ─── */
function render(){
  if(state.screen === 'menu') renderMenu();
  else if(state.screen === 'game') renderGame();

function renderMenu(){
  var ts = totalStars();
  var pct = Math.round(ts / 15 * 100);
  var html = '<div style="padding-top:12px">';
  html += '<div class="title-text anim-pop">Ordsmia ⚒️</div>';
  html += '<div class="subtitle anim-slide">Smi ordene riktig!</div>';
  html += '</div>';
  html += '<div class="progress-wrap anim-slide" style="animation-delay:0.1s">';
  html += '<div class="progress-label"><span>⭐ Framgang</span><span>' + ts + ' / 15 stjerner</span></div>';
  html += '<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:' + pct + '%"></div></div>';
  html += '</div>';
  html += '<div class="mode-grid">';
  for(var mi = 0; mi < MODES.length; mi++){
    var m = MODES[mi];
    var s = getStars(m.id);
    html += '<div class="mode-card anim-slide" style="animation-delay:' + (0.1 + mi * 0.06).toFixed(2) + 's" data-mode="' + m.id + '">';
    html += '<div class="mode-icon">' + m.icon + '</div>';
    html += '<div class="mode-info">';
    html += '<div class="mode-name">' + esc(m.name) + '</div>';
    html += '<div class="mode-desc">' + esc(m.desc) + '</div>';
    html += '<div class="mode-stars">';
    for(var si = 1; si <= 3; si++){
      html += '<span class="star ' + (si <= s ? 'earned' : '') + '">⭐</span>';
    }
    html += '</div></div></div>';
  }
  html += '</div>';
  html += '<div class="footer">';
  html += '<a href="/">&#8592; Tilbake til Kodebasen</a><br>';
  html += 'Laget av Jan Erling Saue med Claude (Anthropic) generativ AI &middot; &copy; 2026<br>';
  html += 'Fri å bruke til undervisning og opplæring — ikke til salg eller kommersiell bruk.';
  html += '</div>';
  appEl.innerHTML = html;

  var cards = appEl.querySelectorAll('.mode-card');
  for(var ci = 0; ci < cards.length; ci++){
    (function(card){
      card.addEventListener('click', function(){
        SoundEngine.click();
        startGame(parseInt(card.getAttribute('data-mode')));
      });
    })(cards[ci]);
  }
}

function startGame(mode){
  state.screen = 'game';
  state.mode = mode;
  state.round = 0;
  state.score = 0;
  state.results = [];
  state.answered = false;
  state.leftSel = null;
  state.matched = [];
  state.mistakes = 0;
  state.forgedWords = [];
  state._rightOrder = null;
  prepareData(mode);
  render();
}

function prepareData(mode){
  if(mode === 1) state.data = pick(WORD_CLASSES, 10);
  else if(mode === 2) state.data = pick(COMPOUND_WORDS, 8);
  else if(mode === 3) state.data = pick(DOUBLE_CONSONANTS, 10);
  else if(mode === 4) state.data = pick(SYNONYMS, 10);
  else if(mode === 5) state.data = pick(SPELLING, 10);
}

function renderGame(){
  if(state.mode === 2) renderCompoundGame();
  else renderStandardGame();
}

function renderStandardGame(){
  var m = state.mode;
  var modeInfo = MODES[m - 1];
  var r = state.round;
  var total = modeInfo.rounds;
  var item = state.data[r];
  var questionHTML = '';
  var optionsHTML = '';

  if(m === 1){
    questionHTML = '<div class="question-word anim-pop">' + esc(item.word) + '</div>';
    questionHTML += '<div class="question-sub">Hvilken ordklasse?</div>';
    var classes = ['Substantiv','Verb','Adjektiv'];
    optionsHTML = '<div class="options cols-3">';
    for(var oi = 0; oi < classes.length; oi++){
      optionsHTML += '<button class="opt-btn" data-answer="' + classes[oi] + '">' + classes[oi] + '</button>';
    }
    optionsHTML += '</div>';
  } else if(m === 3){
    var parts = item.display.split('__');
    questionHTML = '<div class="question-word anim-pop">' + esc(parts[0]) + '<span style="color:#7C3AED;border-bottom:3px dashed #7C3AED">??</span>' + esc(parts[1]) + '</div>';
    questionHTML += '<div class="question-sub">Dobbel eller enkel konsonant?</div>';
    var dOpts = shuf([item.correct, item.wrong]);
    optionsHTML = '<div class="options cols-2">';
    for(var di = 0; di < dOpts.length; di++){
      optionsHTML += '<button class="opt-btn" data-answer="' + esc(dOpts[di]) + '" style="font-size:clamp(18px,5vw,24px)">' + esc(dOpts[di]) + '</button>';
    }
    optionsHTML += '</div>';
  } else if(m === 4){
    questionHTML = '<div class="question-sub">Finn et synonym til:</div>';
    questionHTML += '<div class="question-word anim-pop">' + esc(item.target) + '</div>';
    var synOpts = shuf([item.answer].concat(item.wrong.slice(0, 3)));
    optionsHTML = '<div class="options cols-2">';
    for(var si2 = 0; si2 < synOpts.length; si2++){
      optionsHTML += '<button class="opt-btn" data-answer="' + esc(synOpts[si2]) + '">' + esc(synOpts[si2]) + '</button>';
    }
    optionsHTML += '</div>';
  } else if(m === 5){
    questionHTML = '<div class="question-sub">Hvilken stavemåte er riktig?</div>';
    questionHTML += '<div class="question-hint">Velg riktig stavemåte 🔍</div>';
    var spOpts = shuf([item.correct].concat(item.wrong));
    var colsCls = spOpts.length <= 3 ? 'cols-3' : '';
    optionsHTML = '<div class="options ' + colsCls + '">';
    for(var spi = 0; spi < spOpts.length; spi++){
      optionsHTML += '<button class="opt-btn" data-answer="' + esc(spOpts[spi]) + '">' + esc(spOpts[spi]) + '</button>';
    }
    optionsHTML += '</div>';
  }

  /* Round dots */
  var dotsHTML = '<div class="round-dots">';
  for(var di2 = 0; di2 < total; di2++){
    var cls = '';
    if(di2 < state.results.length) cls = state.results[di2] ? 'correct' : 'wrong';
    else if(di2 === r) cls = 'current';
    dotsHTML += '<div class="round-dot ' + cls + '"></div>';
  }
  dotsHTML += '</div>';

  var fullHTML = '<div class="game-header">';
  fullHTML += '<button class="back-btn" id="backBtn">&#8592; Meny</button>';
  fullHTML += '<div class="round-label">Runde ' + (r + 1) + '/' + total + '</div>';
  fullHTML += '<div class="score-label">&#10003; ' + state.score + '</div>';
  fullHTML += '</div>';
  fullHTML += dotsHTML;
  fullHTML += '<div class="question-area">' + questionHTML + '</div>';
  fullHTML += optionsHTML;
  fullHTML += '<div id="feedback" style="text-align:center;margin-top:12px;min-height:30px"></div>';

  appEl.innerHTML = fullHTML;

  document.getElementById('backBtn').addEventListener('click', function(){
    SoundEngine.click(); state.screen = 'menu'; render();
  });

  if(!state.answered){
    var btns = appEl.querySelectorAll('.opt-btn');
    for(var bi = 0; bi < btns.length; bi++){
      (function(btn){
        btn.addEventListener('click', function(){ handleAnswer(btn); });
      })(btns[bi]);
    }
  }
}

function handleAnswer(btn){
  if(state.answered) return;
  state.answered = true;
  SoundEngine.click();
  var answer = btn.getAttribute('data-answer');
  var m = state.mode;
  var item = state.data[state.round];
  var isCorrect = false;

  if(m === 1) isCorrect = (answer === item.cls);
  else if(m === 3) isCorrect = (answer === item.correct);
  else if(m === 4) isCorrect = (answer === item.answer);
  else if(m === 5) isCorrect = (answer === item.correct);

  var allBtns = appEl.querySelectorAll('.opt-btn');
  for(var ai = 0; ai < allBtns.length; ai++) allBtns[ai].classList.add('disabled');

  if(isCorrect){
    btn.classList.add('correct');
    SoundEngine.correct();
    state.score++;
    state.results.push(true);
  } else {
    btn.classList.add('wrong');
    SoundEngine.wrong();
    state.results.push(false);
    var correctAnswer = '';
    if(m === 1) correctAnswer = item.cls;
    else if(m === 3) correctAnswer = item.correct;
    else if(m === 4) correctAnswer = item.answer;
    else if(m === 5) correctAnswer = item.correct;
    for(var ri = 0; ri < allBtns.length; ri++){
      if(allBtns[ri].getAttribute('data-answer') === correctAnswer){
        allBtns[ri].classList.add('reveal');
      }
    }
    var fb = document.getElementById('feedback');
    if(m === 3){
      fb.innerHTML = '<span style="color:#92400E;font-weight:700">Riktig svar: ' + esc(item.word) + '</span>';
    } else {
      fb.innerHTML = '<span style="color:#92400E;font-weight:700">Riktig svar: ' + esc(correctAnswer) + '</span>';
    }
  }

  var delay = isCorrect ? 800 : 1500;
  setTimeout(function(){
    state.round++;
    state.answered = false;
    if(state.round >= MODES[m - 1].rounds) finishGame();
    else render();
  }, delay);
}

/* ─── Compound Word Game (Mode 2) ─── */
function renderCompoundGame(){
  var pairs = state.data;
  var matched = state.matched;

  /* Shuffle right column once */
  if(!state._rightOrder){
    state._rightOrder = shuf(pairs.map(function(p){ return p[1]; }));
  }

  var html = '<div class="game-header">';
  html += '<button class="back-btn" id="backBtn">&#8592; Meny</button>';
  html += '<div class="round-label">Par: ' + matched.length + '/' + pairs.length + '</div>';
  html += '<div class="score-label" style="color:#DC2626">Feil: ' + state.mistakes + '</div>';
  html += '</div>';
  html += '<div class="question-area" style="padding:16px">';
  html += '<div style="font-size:clamp(14px,3.5vw,16px);font-weight:700;color:#92400E;margin-bottom:12px">Sett sammen ordene! Trykk venstre, så høyre ⚒️</div>';
  html += '<div class="compound-area">';

  /* Left column */
  html += '<div class="compound-col"><div class="compound-col-label">Første del</div>';
  for(var li = 0; li < pairs.length; li++){
    var lMatched = matched.indexOf(li) !== -1;
    var lSel = state.leftSel === li;
    html += '<button class="cw-btn' + (lMatched ? ' matched' : '') + (lSel ? ' selected' : '') + '" data-side="left" data-idx="' + li + '"' + (lMatched ? ' disabled' : '') + '>' + esc(pairs[li][0]) + '</button>';
  }
  html += '</div>';

  /* Right column */
  html += '<div class="compound-col"><div class="compound-col-label">Andre del</div>';
  for(var ri2 = 0; ri2 < state._rightOrder.length; ri2++){
    var rWord = state._rightOrder[ri2];
    var origIdx = -1;
    for(var pi = 0; pi < pairs.length; pi++){
      if(pairs[pi][1] === rWord){ origIdx = pi; break; }
    }
    var rMatched = matched.indexOf(origIdx) !== -1;
    html += '<button class="cw-btn' + (rMatched ? ' matched' : '') + '" data-side="right" data-word="' + esc(rWord) + '" data-origidx="' + origIdx + '"' + (rMatched ? ' disabled' : '') + '>' + esc(rWord) + '</button>';
  }
  html += '</div></div></div>';

  /* Forged words display */
  html += '<div class="forge-result" id="forgeResult">';
  for(var fi = 0; fi < state.forgedWords.length; fi++){
    html += '<span class="forge-word">' + esc(state.forgedWords[fi]) + ' ✨</span>';
  }
  html += '</div>';

  appEl.innerHTML = html;

  document.getElementById('backBtn').addEventListener('click', function(){
    SoundEngine.click(); state._rightOrder = null; state.screen = 'menu'; render();
  });

  var cwBtns = appEl.querySelectorAll('.cw-btn:not([disabled])');
  for(var ci = 0; ci < cwBtns.length; ci++){
    (function(btn){
      btn.addEventListener('click', function(){ handleCompoundClick(btn); });
    })(cwBtns[ci]);
  }
}

function handleCompoundClick(btn){
  var side = btn.getAttribute('data-side');
  if(side === 'left'){
    SoundEngine.click();
    state.leftSel = parseInt(btn.getAttribute('data-idx'));
    render();
  } else if(side === 'right' && state.leftSel !== null){
    SoundEngine.click();
    var leftIdx = state.leftSel;
    var rightOrigIdx = parseInt(btn.getAttribute('data-origidx'));
    var pairs = state.data;

    if(leftIdx === rightOrigIdx){
      SoundEngine.forge();
      setTimeout(function(){ SoundEngine.correct(); }, 200);
      state.matched.push(leftIdx);
      state.forgedWords.push(pairs[leftIdx][0] + pairs[leftIdx][1]);
      state.leftSel = null;
      if(state.matched.length >= pairs.length){
        setTimeout(function(){ finishGame(); }, 600);
      } else {
        render();
      }
    } else {
      SoundEngine.wrong();
      state.mistakes++;
      btn.classList.add('wrong-match');
      state.leftSel = null;
      setTimeout(function(){ render(); }, 500);
    }
  }
}

/* ─── Finish Game ─── */
function finishGame(){
  var m = state.mode;
  var stars = 0;
  if(m === 2){
    if(state.mistakes === 0) stars = 3;
    else if(state.mistakes <= 2) stars = 2;
    else if(state.mistakes <= 4) stars = 1;
  } else {
    var total = MODES[m - 1].rounds;
    if(state.score >= total) stars = 3;
    else if(state.score >= total * 0.8) stars = 2;
    else if(state.score >= total * 0.6) stars = 1;
  }
  setStars(m, stars);
  state.screen = 'result';
  state._stars = stars;
  SoundEngine.fanfare();
  render();
}

function renderResult(){
  var m = state.mode;
  var stars = state._stars;
  var modeInfo = MODES[m - 1];
  var scoreText = '';
  if(m === 2){
    scoreText = state.data.length + ' par smidd — ' + state.mistakes + ' feil';
  } else {
    scoreText = state.score + ' av ' + modeInfo.rounds + ' riktige';
  }

  var emoji = stars >= 3 ? '🏆' : stars >= 2 ? '⚒️' : stars >= 1 ? '🔨' : '🔥';
  var title = stars >= 3 ? 'Mestersmeden!' : stars >= 2 ? 'Dyktig smed!' : stars >= 1 ? 'God innsats!' : 'Prøv igjen!';
  var fact = FACTS[Math.floor(Math.random() * FACTS.length)];

  var html = '<div class="result-screen">';
  html += '<div class="result-emoji anim-pop">' + emoji + '</div>';
  html += '<div class="result-title anim-slide">' + esc(title) + '</div>';
  html += '<div class="result-score anim-slide" style="animation-delay:0.1s">' + esc(scoreText) + '</div>';
  html += '<div class="result-stars">';
  for(var si = 1; si <= 3; si++){
    html += '<span class="star ' + (si <= stars ? 'earned' : '') + '" style="font-size:clamp(32px,8vw,44px)">' + (si <= stars ? '⭐' : '☆') + '</span>';
  }
  html += '</div>';
  html += '<div class="result-fact anim-slide" style="animation-delay:0.2s"><b>💡 Visste du?</b><br>' + esc(fact) + '</div>';
  html += '<div class="result-btns anim-slide" style="animation-delay:0.3s">';
  html += '<button class="res-btn primary" id="replayBtn">🔨 Spill igjen</button>';
  html += '<button class="res-btn secondary" id="menuBtn">&#8592; Tilbake</button>';
  html += '</div></div>';
  html += '<div class="footer">';
  html += '<a href="/">&#8592; Tilbake til Kodebasen</a><br>';
  html += 'Laget av Jan Erling Saue med Claude (Anthropic) generativ AI &middot; &copy; 2026<br>';
  html += 'Fri å bruke til undervisning og opplæring — ikke til salg eller kommersiell bruk.';
  html += '</div>';

  appEl.innerHTML = html;

  document.getElementById('replayBtn').addEventListener('click', function(){
    SoundEngine.click(); state._rightOrder = null; startGame(m);
  });
  document.getElementById('menuBtn').addEventListener('click', function(){
    SoundEngine.click(); state._rightOrder = null; state.screen = 'menu'; render();
  });
}

/* ─── Init ─── */
render();
</script>
</body>
</html>
