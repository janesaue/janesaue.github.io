<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endre passord</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    .boks {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input {
      padding: 0.5rem;
      font-size: 1rem;
      margin: 0.5rem 0;
      width: 200px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    button {
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 1rem;
    }
    .melding {
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .feil { color: red; }
    .ok { color: green; }
    .pw-wrap {
      position: relative;
      display: block;
      width: 200px;
      margin: 0.5rem auto;
    }
    .pw-wrap input {
      width: 100%;
      padding-right: 2.2rem;
      margin: 0;
      height: 2.2rem;
    }
    .pw-toggle {
      position: absolute;
      right: 6px;
      top: 0;
      height: 2.2rem;
      display: flex;
      align-items: center;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 4px;
      color: #888;
      line-height: 1;
    }
    .pw-match {
      font-size: 0.8rem;
      margin: 0.2rem 0 0.3rem;
      display: none;
    }
    .pw-match.like { color: #2ea043; }
    .pw-match.ulike { color: #e53935; }
    a {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.9rem;
      color: #4a90e2;
    }
  </style>
</head>
<body>
  <div class="boks">
    <h2>Endre passord</h2>
    <p class="melding" id="pliktig" style="color:orange;">Du må bytte passord før du kan fortsette</p>
    <form id="passord-skjema">
      <div class="pw-wrap">
        <input type="password" id="gammelt" placeholder="Nåværende passord" autocomplete="current-password" required />
        <button type="button" class="pw-toggle" onclick="togglePw('gammelt', this)">&#128065;</button>
      </div>
      <div class="pw-wrap">
        <input type="password" id="nytt" placeholder="Nytt passord" autocomplete="new-password" required oninput="sjekkMatch()" />
        <button type="button" class="pw-toggle" onclick="togglePw('nytt', this)">&#128065;</button>
      </div>
      <div class="pw-wrap">
        <input type="password" id="bekreft" placeholder="Bekreft nytt passord" autocomplete="new-password" required oninput="sjekkMatch()" />
        <button type="button" class="pw-toggle" onclick="togglePw('bekreft', this)">&#128065;</button>
      </div>
      <p class="pw-match" id="pw-match-status"></p>
      <button type="submit">Endre passord</button>
    </form>
    <p class="melding feil" id="feilmelding"></p>
    <p class="melding ok" id="okmelding"></p>
    <p style="font-size:0.75rem;color:#888;margin-top:1.2rem;">For din sikkerhet: passordet lagres kryptert og kan aldri leses av noen.</p>
    <a href="/">Tilbake til forsiden</a>
  </div>

  <script>
    function sjekkMatch() {
      const nytt = document.getElementById("nytt").value;
      const bekreft = document.getElementById("bekreft").value;
      const status = document.getElementById("pw-match-status");
      if (!nytt || !bekreft) { status.style.display = "none"; return; }
      if (nytt === bekreft) {
        status.textContent = "\u2705 Passordene er like";
        status.className = "pw-match like";
      } else {
        status.textContent = "\u274C Passordene er ikke like";
        status.className = "pw-match ulike";
      }
      status.style.display = "block";
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      if (inp.type === "password") { inp.type = "text"; btn.style.color = "#4a90e2"; }
      else { inp.type = "password"; btn.style.color = "#888"; }
    }

    // Vis "må bytte"-melding hvis brukeren ble tvunget hit av middleware
    if (new URLSearchParams(window.location.search).get("pliktig") === "1") {
      document.getElementById("pliktig").style.display = "block";
    }

    document.getElementById("passord-skjema").addEventListener("submit", async (e) => {
      e.preventDefault();
      const feil = document.getElementById("feilmelding");
      const ok = document.getElementById("okmelding");
      feil.style.display = "none";
      ok.style.display = "none";

      const gammelt = document.getElementById("gammelt").value;
      const nytt = document.getElementById("nytt").value;
      const bekreft = document.getElementById("bekreft").value;

      if (nytt !== bekreft) {
        feil.textContent = "De nye passordene er ikke like";
        feil.style.display = "block";
        return;
      }

      if (nytt.length < 6) {
        feil.textContent = "Nytt passord må være minst 6 tegn";
        feil.style.display = "block";
        return;
      }

      try {
        const res = await fetch("/api/change-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ gammeltPassord: gammelt, nyttPassord: nytt })
        });
        const data = await res.json();
        if (res.ok) {
          ok.textContent = "Passordet er endret! Sender deg videre...";
          ok.style.display = "block";
          document.getElementById("pliktig").style.display = "none";
          document.getElementById("passord-skjema").reset();
          setTimeout(() => { window.location.href = "/"; }, 1500);
        } else {
          feil.textContent = data.error || "Noe gikk galt";
          feil.style.display = "block";
        }
      } catch (err) {
        feil.textContent = "Kunne ikke koble til serveren";
        feil.style.display = "block";
      }
    });
  </script>
</body>
</html>
