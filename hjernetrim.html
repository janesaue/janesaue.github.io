<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Hjernetrim - Kodebasen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0F172A;--bg2:#1E293B;
  --purple:#8B5CF6;--purple-l:#A78BFA;
  --cyan:#06B6D4;--cyan-l:#22D3EE;
  --green:#4ADE80;--red:#F87171;
  --glass:rgba(255,255,255,0.08);
  --glass2:rgba(255,255,255,0.12);
}
html,body{height:100%;overflow-x:hidden;}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:#e2e8f0;
  min-height:100vh;position:relative;
}
h1,h2,h3,.title-font{font-family:'Fredoka One',cursive;}
button,.btn{
  font-family:'Nunito',sans-serif;cursor:pointer;border:none;outline:none;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.btn{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:#fff;font-weight:700;font-size:clamp(0.9rem,2.5vw,1.1rem);
  padding:0.7em 1.5em;border-radius:12px;
  transition:transform 0.15s,box-shadow 0.15s;
  touch-action:manipulation;
}
.btn:active{transform:scale(0.95);}
.btn:hover{box-shadow:0 0 20px rgba(139,92,246,0.4);}
.btn-secondary{
  background:var(--glass2);border:1px solid rgba(255,255,255,0.15);
}
.btn-secondary:hover{background:var(--glass);box-shadow:0 0 15px rgba(6,182,212,0.3);}
canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;}
.screen{
  display:none;flex-direction:column;align-items:center;
  width:100%;max-width:700px;margin:0 auto;padding:1rem;
  flex:1;
}
.screen.active{display:flex;}
.glass-card{
  background:var(--glass);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;padding:1.2rem;
  transition:transform 0.2s,box-shadow 0.2s;
}
.stars{color:#FBBF24;font-size:1.5rem;letter-spacing:4px;}
#menu-screen{padding-top:1.5rem;gap:1rem;}
.menu-title{
  font-size:clamp(2rem,6vw,3rem);text-align:center;
  background:linear-gradient(135deg,var(--purple-l),var(--cyan-l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.menu-sub{font-size:clamp(0.9rem,2.5vw,1.1rem);color:var(--cyan-l);margin-bottom:0.3rem;text-align:center;}
.brain-hero{font-size:clamp(3rem,10vw,5rem);text-align:center;animation:pulse-glow 2s ease-in-out infinite;}
@keyframes pulse-glow{
  0%,100%{filter:drop-shadow(0 0 10px rgba(139,92,246,0.5));}
  50%{filter:drop-shadow(0 0 25px rgba(139,92,246,0.9)) drop-shadow(0 0 40px rgba(6,182,212,0.4));}
}
.brain-level{
  text-align:center;font-weight:700;font-size:clamp(0.85rem,2.2vw,1rem);
  color:var(--purple-l);margin-bottom:0.3rem;
}
.mode-grid{display:flex;flex-direction:column;gap:0.7rem;width:100%;}
.mode-card{
  display:flex;align-items:center;gap:1rem;width:100%;
  cursor:pointer;touch-action:manipulation;text-align:left;
  padding:1rem;
}
.mode-card:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(139,92,246,0.3);}
.mode-card:active{transform:scale(0.98);}
.mode-icon{font-size:2rem;flex-shrink:0;}
.mode-info{flex:1;min-width:0;}
.mode-name{font-weight:800;font-size:clamp(0.95rem,2.5vw,1.1rem);color:#fff;}
.mode-desc{font-size:clamp(0.75rem,2vw,0.85rem);color:#94a3b8;margin-top:2px;}
.mode-stars{flex-shrink:0;font-size:1.1rem;}
.diff-selector{display:flex;gap:0.5rem;width:100%;justify-content:center;margin-bottom:0.3rem;}
.diff-btn{
  flex:1;max-width:140px;padding:0.55em 0.5em;border-radius:10px;
  font-size:clamp(0.78rem,2.2vw,0.9rem);font-weight:700;
  background:var(--glass);border:2px solid rgba(255,255,255,0.1);
  color:#94a3b8;transition:all 0.2s;text-align:center;
}
.diff-btn.active{color:#fff;border-color:var(--purple);background:rgba(139,92,246,0.25);box-shadow:0 0 12px rgba(139,92,246,0.3);}
.diff-btn:hover{border-color:rgba(139,92,246,0.5);}
.diff-label{font-size:clamp(0.7rem,1.8vw,0.78rem);color:#64748b;text-align:center;margin-bottom:0.2rem;}
.footer{
  text-align:center;font-size:clamp(0.7rem,1.8vw,0.8rem);color:#64748b;
  padding:1rem 0.5rem;margin-top:auto;line-height:1.6;
}
.footer a{color:var(--cyan);text-decoration:none;}
.footer a:hover{text-decoration:underline;}
.sound-toggle{
  position:fixed;bottom:1rem;right:1rem;z-index:100;
  width:44px;height:44px;border-radius:50%;
  background:var(--glass2);border:1px solid rgba(255,255,255,0.15);
  font-size:1.3rem;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;
}
.game-header{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  padding:0.5rem 0;margin-bottom:0.5rem;
}
.game-header .back-btn{
  background:none;color:var(--purple-l);font-size:1.5rem;
  padding:0.3rem;touch-action:manipulation;
}
.game-header .title{font-size:clamp(1rem,3vw,1.3rem);color:var(--cyan-l);}
.game-header .score{font-size:clamp(0.85rem,2.2vw,1rem);color:var(--purple-l);font-weight:700;}
.progress-bar{
  width:100%;height:6px;background:var(--glass);border-radius:3px;
  margin-bottom:1rem;overflow:hidden;
}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:3px;transition:width 0.4s;}
.instruction{text-align:center;padding:2rem 1rem;}
.instruction h2{font-size:clamp(1.3rem,4vw,1.8rem);margin-bottom:0.5rem;color:var(--cyan-l);}
.instruction p{font-size:clamp(0.85rem,2.3vw,1rem);color:#94a3b8;max-width:400px;margin:0 auto;}
.result{text-align:center;padding:1.5rem;gap:1rem;display:flex;flex-direction:column;align-items:center;}
.result h2{font-size:clamp(1.3rem,4vw,1.8rem);color:var(--cyan-l);}
.result .big-stars{font-size:clamp(2.5rem,8vw,4rem);letter-spacing:8px;}
.result .score-text{font-size:clamp(1rem,3vw,1.3rem);font-weight:700;}
.result .fun-fact{
  font-size:clamp(0.8rem,2vw,0.9rem);color:#94a3b8;
  max-width:400px;font-style:italic;margin-top:0.5rem;
}
.result-buttons{display:flex;gap:0.8rem;flex-wrap:wrap;justify-content:center;}
.memory-grid{
  display:grid;gap:clamp(6px,1.5vw,10px);
  width:100%;max-width:500px;margin:0 auto;
}
.memory-card{
  aspect-ratio:1;border-radius:12px;cursor:pointer;touch-action:manipulation;
  perspective:600px;position:relative;
}
.memory-card .card-inner{
  width:100%;height:100%;position:relative;
  transition:transform 0.5s;transform-style:preserve-3d;
}
.memory-card.flipped .card-inner{transform:rotateY(180deg);}
.memory-card .card-front,.memory-card .card-back{
  position:absolute;width:100%;height:100%;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:clamp(0.6rem,2.5vw,0.9rem);font-weight:700;text-align:center;
  padding:4px;word-break:break-word;overflow:hidden;
}
.memory-card .card-front{
  background:linear-gradient(135deg,var(--purple),#6d28d9);
  color:rgba(255,255,255,0.6);font-size:1.5rem;
}
.memory-card .card-back{
  background:var(--bg2);border:2px solid var(--purple);
  color:#e2e8f0;transform:rotateY(180deg);
}
.memory-card.matched .card-back{border-color:var(--green);box-shadow:0 0 15px rgba(74,222,128,0.3);}
.memory-card.matched{pointer-events:none;}
.simon-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2vw,14px);
  width:min(300px,70vw);margin:1rem auto;
}
.simon-btn{
  aspect-ratio:1;border-radius:16px;border:none;cursor:pointer;
  touch-action:manipulation;transition:filter 0.1s,transform 0.1s;
  opacity:0.6;
}
.simon-btn.lit{opacity:1;transform:scale(1.05);filter:brightness(1.4);}
.simon-btn[data-color="red"]{background:#EF4444;box-shadow:inset 0 0 30px rgba(0,0,0,0.3);}
.simon-btn[data-color="blue"]{background:#3B82F6;box-shadow:inset 0 0 30px rgba(0,0,0,0.3);}
.simon-btn[data-color="green"]{background:#22C55E;box-shadow:inset 0 0 30px rgba(0,0,0,0.3);}
.simon-btn[data-color="yellow"]{background:#EAB308;box-shadow:inset 0 0 30px rgba(0,0,0,0.3);}
.simon-btn.lit[data-color="red"]{box-shadow:0 0 40px #EF4444,inset 0 0 20px rgba(255,255,255,0.2);}
.simon-btn.lit[data-color="blue"]{box-shadow:0 0 40px #3B82F6,inset 0 0 20px rgba(255,255,255,0.2);}
.simon-btn.lit[data-color="green"]{box-shadow:0 0 40px #22C55E,inset 0 0 20px rgba(255,255,255,0.2);}
.simon-btn.lit[data-color="yellow"]{box-shadow:0 0 40px #EAB308,inset 0 0 20px rgba(255,255,255,0.2);}
.simon-status{text-align:center;font-size:clamp(1rem,3vw,1.3rem);font-weight:700;color:var(--cyan-l);margin:0.5rem 0;}
.items-display{
  display:flex;flex-wrap:wrap;justify-content:center;gap:clamp(8px,2vw,16px);
  margin:1rem 0;min-height:80px;transition:opacity 0.3s;
}
.item-emoji{font-size:clamp(2rem,7vw,3.5rem);transition:opacity 0.3s,transform 0.3s;}
.options-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:clamp(8px,2vw,12px);
  width:100%;max-width:400px;margin:0.5rem auto;
}
.option-btn{
  padding:clamp(0.6rem,2vw,1rem);border-radius:12px;
  font-size:clamp(1.5rem,5vw,2.5rem);
  background:var(--glass2);border:2px solid rgba(255,255,255,0.1);
  cursor:pointer;touch-action:manipulation;
  transition:transform 0.15s,border-color 0.15s;
}
.option-btn:active{transform:scale(0.95);}
.option-btn.correct{border-color:var(--green);background:rgba(74,222,128,0.15);}
.option-btn.wrong{border-color:var(--red);background:rgba(248,113,113,0.15);}
.seq-display{
  font-size:clamp(1.8rem,6vw,2.8rem);font-weight:900;letter-spacing:clamp(6px,2vw,12px);
  color:var(--cyan-l);text-align:center;margin:1rem 0;min-height:3rem;
  font-family:'Fredoka One',cursive;
}
.input-display{
  font-size:clamp(1.5rem,5vw,2.2rem);font-weight:800;letter-spacing:8px;
  color:var(--purple-l);text-align:center;margin:0.5rem 0;min-height:2.5rem;
  background:var(--glass);border-radius:12px;padding:0.5rem;
  min-width:200px;
}
.onscreen-kb{
  display:grid;grid-template-columns:repeat(7,1fr);gap:clamp(4px,1vw,6px);
  width:100%;max-width:420px;margin:0.5rem auto;
}
.kb-key{
  padding:clamp(0.4rem,1.5vw,0.6rem);border-radius:8px;
  font-size:clamp(0.85rem,2.5vw,1.1rem);font-weight:700;
  background:var(--glass2);border:1px solid rgba(255,255,255,0.1);
  color:#e2e8f0;touch-action:manipulation;cursor:pointer;
  transition:transform 0.1s;
}
.kb-key:active{transform:scale(0.9);background:var(--purple);}
.kb-key.del{background:rgba(248,113,113,0.2);border-color:rgba(248,113,113,0.3);}
.kb-key.submit{background:linear-gradient(135deg,var(--purple),var(--cyan));grid-column:span 2;}
.pattern-seq{
  display:flex;align-items:center;justify-content:center;gap:clamp(4px,1.5vw,10px);
  flex-wrap:wrap;margin:1rem 0;min-height:60px;
}
.pattern-item{
  font-size:clamp(1.3rem,4.5vw,2rem);
  background:var(--glass);border-radius:10px;
  padding:clamp(4px,1vw,8px) clamp(6px,1.5vw,12px);
}
.pattern-q{font-size:clamp(1.5rem,5vw,2.2rem);color:var(--cyan-l);font-weight:900;}
.feedback{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(3rem,12vw,5rem);z-index:200;
  pointer-events:none;animation:fb 0.6s ease-out forwards;
}
@keyframes fb{
  0%{opacity:1;transform:translate(-50%,-50%) scale(0.5);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.5);}
}
.fade-in{animation:fadeIn 0.3s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<div id="app">
  <!-- MENU -->
  <div id="menu-screen" class="screen active">
    <div class="brain-hero">&#x1f9e0;</div>
    <h1 class="menu-title title-font">Hjernetrim</h1>
    <p class="menu-sub">Tren hjernen din! &#x26a1;</p>
    <div class="brain-level" id="brain-level"></div>
    <div class="mode-grid" id="mode-grid"></div>
    <div class="footer">
      <a href="/">&larr; Tilbake til Kodebasen</a><br>
      Laget av Jan Erling Saue med Claude (Anthropic) generativ AI &middot; &copy; 2026<br>
      Fri &aring; bruke til undervisning og oppl&aelig;ring &mdash; ikke til salg eller kommersiell bruk.
    </div>
  </div>
  <!-- GAME -->
  <div id="game-screen" class="screen">
    <div class="game-header">
      <button class="back-btn" id="back-btn" onclick="showMenu()">&larr;</button>
      <span class="title" id="game-title"></span>
      <span class="score" id="game-score"></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="game-area" style="width:100%;flex:1;display:flex;flex-direction:column;align-items:center;"></div>
  </div>
  <!-- RESULT -->
  <div id="result-screen" class="screen">
    <div class="result fade-in">
      <h2 id="result-title"></h2>
      <div class="big-stars" id="result-stars"></div>
      <div class="score-text" id="result-score"></div>
      <div class="fun-fact" id="result-fact"></div>
      <div class="result-buttons">
        <button class="btn" id="result-again">Spill igjen</button>
        <button class="btn btn-secondary" onclick="showMenu()">Tilbake</button>
      </div>
    </div>
  </div>
</div>
<button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">&#x1f50a;</button>

<script>
'use strict';
/* ===== GLOBALS ===== */
var soundOn = true, audioCtx = null;
var LS_KEY = 'hjernetrim_v1';
var currentDiff = parseInt(localStorage.getItem('hjernetrim_diff') || '0', 10); // 0=Normal, 1=Medium, 2=Vanskelig
var DIFF_NAMES = ['Normal','Medium','Vanskelig'];
var DIFF_ICONS = ['\u{1f331}','\u26a1','\u{1f525}'];

var MODES = [
  {id:'memory',  name:'Huskeleken',   icon:'\u{1f9e9}', desc:'Finn par som h\u00f8rer sammen!'},
  {id:'simon',   name:'Sekvensen',    icon:'\u26a1',     desc:'Husk rekkef\u00f8lgen!'},
  {id:'missing', name:'Hva manglet?', icon:'\u{1f50d}',  desc:'Hva ble borte?'},
  {id:'backwards',name:'Baklengs',    icon:'\u{1f504}',  desc:'Skriv baklengs!'},
  {id:'pattern', name:'M\u00f8nsteret',icon:'\u{1f3af}', desc:'Finn m\u00f8nsteret!'}
];

var FUN_FACTS = [
  'Hjernen din veier ca. 1,4 kg \u2014 like mye som en liten melon! \u{1f348}',
  'Hjernen sender signaler med 430 km/t \u2014 raskere enn et tog! \u{1f684}',
  'Du har ca. 86 milliarder nerveceller i hjernen! \u{1f92f}',
  'Hjernen bruker 20% av all energien din \u2014 selv om den bare er 2% av kroppsvekten! \u26a1',
  'N\u00e5r du sover, rydder hjernen opp og lagrer det du l\u00e6rte i dag! \u{1f634}',
  'Hjernen din er ferdig utviklet f\u00f8rst n\u00e5r du er ca. 25 \u00e5r! \u{1f331}',
  'Du kan ikke kile deg selv fordi hjernen vet hva som kommer! \u{1f92d}',
  'Hjernen lager nok str\u00f8m til \u00e5 lyse opp en liten lysp\u00e6re! \u{1f4a1}'
];

/* ===== UTILS ===== */
function shuf(a) {
  var c = a.slice();
  for (var i = c.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = c[i]; c[i] = c[j]; c[j] = t;
  }
  return c;
}
function loadData() { try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e) { return {}; } }
function saveData(d) { try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch(e) {} }
function diffKey(id) { return id + '_' + currentDiff; }
function getBest(id) { return loadData()[diffKey(id)] || 0; }
function saveBest(id, stars) { var d = loadData(); var k = diffKey(id); if (stars > (d[k]||0)) { d[k] = stars; saveData(d); } }
function totalStars() { var d = loadData(), s = 0; MODES.forEach(function(m){ s += (d[diffKey(m.id)]||0); }); return s; }
function brainLevel(s) {
  if (s >= 15) return 'Superhirn \u{1f9e0}\u{1f451}';
  if (s >= 10) return 'Geni \u{1f31f}';
  if (s >= 5) return 'Skarp \u26a1';
  return 'Nybegynner \u{1f331}';
}
function starsHTML(n) { var s = ''; for (var i = 0; i < 3; i++) s += i < n ? '\u2b50' : '\u2606'; return s; }

/* ===== AUDIO ===== */
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, dur, type, vol) {
  if (!soundOn) return; ensureAudio();
  dur = dur || 0.15; type = type || 'square'; vol = vol || 0.12;
  var o = audioCtx.createOscillator(), g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function sndCorrect() { playTone(523,0.1,'sine',0.15); setTimeout(function(){playTone(659,0.1,'sine',0.15);},80); setTimeout(function(){playTone(784,0.15,'sine',0.15);},160); }
function sndWrong() { playTone(180,0.3,'sawtooth',0.1); }
function sndFlip() { playTone(440,0.06,'sine',0.08); }
function sndMatch() { playTone(600,0.08,'sine',0.12); setTimeout(function(){playTone(800,0.12,'sine',0.12);},80); }
function sndFanfare() { [523,659,784,1047].forEach(function(f,i){ setTimeout(function(){playTone(f,0.2,'sine',0.13);}, i*120); }); }
function sndSimon(color) { var freq = {red:262,blue:330,green:392,yellow:523}; playTone(freq[color]||440,0.3,'sine',0.18); }
function toggleSound() { soundOn = !soundOn; document.getElementById('sound-toggle').textContent = soundOn ? '\u{1f50a}' : '\u{1f507}'; }

/* ===== PARTICLES ===== */
(function() {
  var cv = document.getElementById('particles'), cx = cv.getContext('2d');
  var W, H, pts = [];
  function resize() {
    W = cv.width = window.innerWidth; H = cv.height = window.innerHeight;
    if (!pts.length) for (var i = 0; i < 25; i++) pts.push({
      x: Math.random()*W, y: Math.random()*H,
      vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3,
      r: Math.random()*2+1
    });
  }
  resize(); window.addEventListener('resize', resize);
  (function draw() {
    cx.clearRect(0,0,W,H);
    for (var k = 0; k < pts.length; k++) {
      var p = pts[k];
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      cx.fillStyle = 'rgba(139,92,246,0.25)'; cx.fill();
    }
    for (var i = 0; i < pts.length; i++) for (var j = i+1; j < pts.length; j++) {
      var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      var d = Math.sqrt(dx*dx + dy*dy);
      if (d < 150) {
        cx.beginPath(); cx.moveTo(pts[i].x, pts[i].y); cx.lineTo(pts[j].x, pts[j].y);
        cx.strokeStyle = 'rgba(6,182,212,' + (0.08*(1-d/150)) + ')';
        cx.lineWidth = 0.5; cx.stroke();
      }
    }
    requestAnimationFrame(draw);
  })();
})();

  ]},

    ['Sel','Is'],['Rev','Skog'],['Laks','Elv'],['Pingvin','Antarktis'],
    ['Kamel','\u00d8rken'],['Papeg\u00f8ye','Regnskog'],['Isbj\u00f8rn','Arktis'],['Ulv','Vidde']
  ]},

    ['27','9\u00d73'],['36','6\u00d76'],['45','9\u00d75'],['100','10\u00d710']
  ]}
};

function startMemory() {
  showGame('Huskeleken \u{1f9e9}', '');
  var themeKeys = shuf(['A','B','C']);
  var difficulty = 0;

  function playRound() {
    // Difficulty scaling: Normal 4→6→8, Medium 6→8→10, Hard 8→10→12
    var pairSets = [[4,6,8],[6,8,10],[8,10,12]];
    var nPairs = pairSets[currentDiff][difficulty];
    var theme = MEM_THEMES[themeKeys[difficulty % 3]];
    var picked = shuf(theme.pairs).slice(0, nPairs);
    var cards = [];
    picked.forEach(function(pair, idx) {
      cards.push({text: pair[0], pairId: idx});
      cards.push({text: pair[1], pairId: idx});
    });
    cards = shuf(cards);
    var cols = nPairs <= 4 ? 4 : nPairs <= 6 ? 4 : 5;

    var flipped = [], matched = 0, moves = 0, locked = false;
    var a = gArea();
    var label = ['Lett','Medium','Vanskelig'][difficulty];
    a.innerHTML = '<p style="text-align:center;color:#94a3b8;font-size:0.85rem;margin-bottom:0.5rem;">' +
      theme.name + ' \u2014 ' + label + '</p>' +
      '<div class="memory-grid" style="grid-template-columns:repeat(' + cols + ',1fr);"></div>';
    var grid = a.querySelector('.memory-grid');
    setScore('Trekk: 0');

    cards.forEach(function(c) {
      var el = document.createElement('div');
      el.className = 'memory-card';
      el.innerHTML = '<div class="card-inner"><div class="card-front">?</div>' +
        '<div class="card-back">' + c.text + '</div></div>';
      el.onclick = function() {
        if (locked || el.classList.contains('flipped') || el.classList.contains('matched')) return;
        sndFlip();
        el.classList.add('flipped');
        flipped.push({el: el, card: c});
        if (flipped.length === 2) {
          moves++; setScore('Trekk: ' + moves);
          locked = true;
          var fa = flipped[0], fb = flipped[1];
          if (fa.card.pairId === fb.card.pairId) {
            sndMatch();
            setTimeout(function() {
              fa.el.classList.add('matched');
              fb.el.classList.add('matched');
              matched++; locked = false;
              if (matched === nPairs) {
                var allThresh = [
                  [[6,8,12],[10,14,20],[16,22,30]],
                  [[10,14,20],[16,22,30],[20,28,38]],
                  [[16,22,30],[20,28,38],[24,34,46]]
                ];
                var t = allThresh[currentDiff][difficulty];
                var s = moves <= t[0] ? 3 : moves <= t[1] ? 2 : 1;
                showFeedback('\u2705');
                if (difficulty < 2) { difficulty++; setTimeout(playRound, 800); }
                else { setTimeout(function(){ showResult('memory', s, moves + ' trekk'); }, 600); }
              }
            }, 500);
          } else {
            sndWrong();
            setTimeout(function() {
              fa.el.classList.remove('flipped');
              fb.el.classList.remove('flipped');
              locked = false;
            }, 900);
          }
          flipped = [];
        }
      };
      grid.appendChild(el);
    });
  }

  showInstruction('\u{1f9e9}', 'Huskeleken',
    'Finn par som h\u00f8rer sammen! Snu to kort om gangen.',
    function() { playRound(); });
}

/* ===== MODE 2: SEKVENSEN (Simon Says) ===== */
function startSimon() {
  showGame('Sekvensen \u26a1', '');
  var COLORS = ['red','blue','green','yellow'];
  var sequence = [], playerIdx = 0, playing = false, showingSeq = false;

  function buildUI() {
    var a = gArea();
    a.innerHTML = '<div class="simon-status" id="simon-status">Se og husk!</div>' +
      '<div class="simon-grid" id="simon-grid"></div>';
    var grid = document.getElementById('simon-grid');
    COLORS.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'simon-btn';
      btn.setAttribute('data-color', c);
      btn.onclick = function() { if (!playing || showingSeq) return; playerTap(c); };
      grid.appendChild(btn);
    });
  }

  function lightUp(color, dur) {
    dur = dur || 400;
    var btn = document.querySelector('.simon-btn[data-color="' + color + '"]');
    if (!btn) return;
    btn.classList.add('lit'); sndSimon(color);
    setTimeout(function() { btn.classList.remove('lit'); }, dur * 0.8);
  }

  // Difficulty: Normal 600ms, Medium 450ms, Hard 350ms
  var simonSpeed = [600, 450, 350][currentDiff];
  var starThresh = [[4,6,8],[6,8,10],[8,10,12]][currentDiff];
  var maxProg = starThresh[2];

  function nextRound() {
    sequence.push(COLORS[Math.floor(Math.random() * 4)]);
    document.getElementById('simon-status').textContent = 'Runde ' + sequence.length + ' \u2014 Se og husk!';
    setScore('Steg: ' + (sequence.length - 1));
    setProgress(Math.min(sequence.length - 1, maxProg), maxProg);
    showingSeq = true; playing = false;
    var i = 0;
    var iv = setInterval(function() {
      if (i >= sequence.length) {
        clearInterval(iv); showingSeq = false; playing = true; playerIdx = 0;
        document.getElementById('simon-status').textContent = 'Din tur!';
      } else { lightUp(sequence[i]); i++; }
    }, simonSpeed);
  }

  function playerTap(c) {
    lightUp(c, 250);
    if (c === sequence[playerIdx]) {
      playerIdx++;
      if (playerIdx === sequence.length) {
        playing = false; sndCorrect();
        setTimeout(nextRound, 800);
      }
    } else {
      playing = false; sndWrong(); showFeedback('\u274c');
      var steps = sequence.length - 1;
      var stars = steps >= starThresh[2] ? 3 : steps >= starThresh[1] ? 2 : steps >= starThresh[0] ? 1 : 0;
      setTimeout(function() { showResult('simon', Math.max(stars, 0), 'Du husket ' + steps + ' steg!'); }, 800);
    }
  }

  showInstruction('\u26a1', 'Sekvensen',
    'Se rekkef\u00f8lgen fargene lyser opp i, og gjenta den!',
    function() { buildUI(); nextRound(); });
}

/* ===== MODE 3: HVA MANGLET? (What's Missing) ===== */
var MISSING_SETS = [
  ['\u{1f34e}','\u{1f34c}','\u{1f34a}','\u{1f347}','\u{1f353}','\u{1f351}','\u{1f352}','\u{1f95d}'],
  ['\u{1f436}','\u{1f431}','\u{1f438}','\u{1f981}','\u{1f427}','\u{1f98a}','\u{1f42c}','\u{1f98b}'],
  ['\u{1f697}','\u{1f680}','\u{1f682}','\u{1f6b2}','\u{1f6e9}\ufe0f','\u26f5','\u{1f681}','\u{1f6f8}'],
  ['\u26bd','\u{1f3c0}','\u{1f3be}','\u26be','\u{1f3c8}','\u{1f3b1}','\u{1f3d3}','\u{1f94a}'],
  ['\u2600\ufe0f','\u{1f327}\ufe0f','\u26c8\ufe0f','\u{1f308}','\u2744\ufe0f','\u{1f32a}\ufe0f','\u{1f324}\ufe0f','\u{1f319}'],
  ['\u{1f355}','\u{1f354}','\u{1f32e}','\u{1f363}','\u{1f369}','\u{1f9c1}','\u{1f957}','\u{1f35c}']
];

function startMissing() {
  showGame('Hva manglet? \u{1f50d}', '');
  var round = 0, score = 0, TOTAL = 8;

  function playRound() {
    if (round >= TOTAL) {
      var stars = score >= 8 ? 3 : score >= 6 ? 2 : score >= 4 ? 1 : 0;
      setTimeout(function() { showResult('missing', Math.max(stars, 1), score + '/' + TOTAL + ' riktige'); }, 300);
      return;
    }
    setProgress(round, TOTAL); setScore(score + '/' + round);
    // Difficulty: Normal 4→6→8, Medium 5→7→8, Hard 6→8→8 items
    var itemSets = [[4,6,8],[5,7,8],[6,8,8]][currentDiff];
    var nItems = round < 3 ? itemSets[0] : round < 6 ? itemSets[1] : itemSets[2];
    var setIdx = Math.floor(Math.random() * MISSING_SETS.length);
    var items = shuf(MISSING_SETS[setIdx]).slice(0, nItems);
    // Hard mode: remove 2 items in later rounds
    var nRemove = (currentDiff === 2 && round >= 4) ? 2 : 1;
    var removedArr = [];
    var remaining = items.slice();
    for (var ri = 0; ri < nRemove; ri++) {
      var rIdx = Math.floor(Math.random() * remaining.length);
      removedArr.push(remaining[rIdx]);
      remaining.splice(rIdx, 1);
    }
    var removed = removedArr[0]; // primary for answer

    var a = gArea();
    a.innerHTML = '<p style="text-align:center;font-weight:700;color:var(--cyan-l);margin:0.5rem 0;">Runde ' +
      (round+1) + '/' + TOTAL + (nRemove > 1 ? ' \u2014 Husk disse! (2 forsvinner!)' : ' \u2014 Husk disse!') + '</p>' +
      '<div class="items-display" id="items-disp"></div>';
    var disp = document.getElementById('items-disp');
    items.forEach(function(e) {
      var s = document.createElement('span'); s.className = 'item-emoji'; s.textContent = e;
      disp.appendChild(s);
    });

    // Difficulty: Normal 3-4s, Medium 2.5-3s, Hard 2-2.5s
    var timeSets = [[3000,3500,4000],[2500,3000,3000],[2000,2500,2500]][currentDiff];
    var showTime = round < 3 ? timeSets[0] : round < 6 ? timeSets[1] : timeSets[2];
    setTimeout(function() {
      disp.style.opacity = '0';
      setTimeout(function() {
        disp.innerHTML = '';
        remaining.forEach(function(e) {
          var s = document.createElement('span'); s.className = 'item-emoji'; s.textContent = e;
          disp.appendChild(s);
        });
        disp.style.opacity = '1';

        // Build answer options
        var alts = [removed];
        var others = MISSING_SETS[setIdx].filter(function(x) { return items.indexOf(x) < 0; });
        var pool = shuf(others);
        while (alts.length < 4 && pool.length) alts.push(pool.pop());
        // Fallback if not enough alternatives from unused items
        if (alts.length < 4) {
          var fbSets = MISSING_SETS.filter(function(_, i) { return i !== setIdx; });
          var fb = shuf(fbSets[Math.floor(Math.random() * fbSets.length)]);
          for (var fi = 0; fi < fb.length && alts.length < 4; fi++) {
            if (alts.indexOf(fb[fi]) < 0) alts.push(fb[fi]);
          }
        }
        alts = shuf(alts);

        var lbl = document.createElement('p');
        lbl.style.cssText = 'text-align:center;font-weight:700;color:var(--purple-l);margin:0.8rem 0 0.3rem;';
        lbl.textContent = 'Hva manglet?';
        a.appendChild(lbl);

        var og = document.createElement('div'); og.className = 'options-grid';
        alts.forEach(function(opt) {
          var b = document.createElement('button'); b.className = 'option-btn'; b.textContent = opt;
          b.onclick = function() {
            og.querySelectorAll('.option-btn').forEach(function(x) { x.style.pointerEvents = 'none'; });
            if (opt === removed) { score++; b.classList.add('correct'); sndCorrect(); showFeedback('\u2705'); }
            else {
              b.classList.add('wrong'); sndWrong(); showFeedback('\u274c');
              og.querySelectorAll('.option-btn').forEach(function(x) { if (x.textContent === removed) x.classList.add('correct'); });
            }
            round++; setTimeout(playRound, 900);
          };
          og.appendChild(b);
        });
        a.appendChild(og);
      }, 300);
    }, showTime);
  }

  showInstruction('\u{1f50d}', 'Hva manglet?',
    'Se p\u00e5 tingene, s\u00e5 forsvinner en. Hvilken?',
    function() { playRound(); });
}

/* ===== MODE 4: BAKLENGS (Backwards) ===== */
function startBackwards() {
  showGame('Baklengs \u{1f504}', '');
  var round = 0, score = 0, TOTAL = 10;
  var LETTERS = 'ABCDEFGHIJKLMNOPRSTUVW'.split('');
  var WORDS3 = ['SOL','BIL','HUS','MAT','BOK','FIN','GOD','ROS','TUR','DAG'];
  var WORDS4 = ['LESE','SOVE','GULL','SKIP','TALL','SPIS','SENG','BALL','HUND','FUGL'];

  function genSeq(len) {
    if (len === 3 && Math.random() < 0.4) return shuf(WORDS3)[0].split('');
    if (len === 4 && Math.random() < 0.3) return shuf(WORDS4)[0].split('');
    var arr = [];
    for (var i = 0; i < len; i++) {
      if (Math.random() < 0.4) arr.push(String(Math.floor(Math.random() * 10)));
      else arr.push(LETTERS[Math.floor(Math.random() * LETTERS.length)]);
    }
    return arr;
  }

  function playRound() {
    if (round >= TOTAL) {
      var stars = score >= 10 ? 3 : score >= 8 ? 2 : score >= 6 ? 1 : 0;
      setTimeout(function() { showResult('backwards', Math.max(stars, 1), score + '/' + TOTAL + ' riktige'); }, 300);
      return;
    }
    setProgress(round, TOTAL); setScore(score + '/' + round);
    // Difficulty: Normal 3→4→5→6, Medium 4→5→6→7, Hard 5→6→7→8
    var lenSets = [[3,4,5,6],[4,5,6,7],[5,6,7,8]][currentDiff];
    var len = round < 3 ? lenSets[0] : round < 6 ? lenSets[1] : round < 8 ? lenSets[2] : lenSets[3];
    var seq = genSeq(len);
    var answer = seq.slice().reverse().join('');
    // Shorter display time at higher difficulty
    var baseTime = [[3000,4000,5000],[2500,3500,4500],[2000,3000,4000]][currentDiff];
    var showTime = len <= lenSets[0] ? baseTime[0] : len <= lenSets[1] ? baseTime[1] : baseTime[2];

    var a = gArea();
    a.innerHTML = '<p style="text-align:center;font-weight:700;color:var(--cyan-l);margin:0.5rem 0;">Runde ' +
      (round+1) + '/' + TOTAL + ' \u2014 Husk dette!</p>' +
      '<div class="seq-display">' + seq.join(' ') + '</div>';

    setTimeout(function() {
      var input = '';
      a.innerHTML = '<p style="text-align:center;font-weight:700;color:var(--purple-l);margin:0.5rem 0;">Skriv baklengs!</p>' +
        '<div class="input-display" id="inp-disp">\u00a0</div>' +
        '<div class="onscreen-kb" id="kb"></div>';
      var inpDisp = document.getElementById('inp-disp');
      var kb = document.getElementById('kb');
      var keys = 'ABCDEFGHIJKLMNOPRSTUVW0123456789'.split('');
      keys.forEach(function(k) {
        var b = document.createElement('button'); b.className = 'kb-key'; b.textContent = k;
        b.onclick = function() {
          if (input.length < len) { input += k; inpDisp.textContent = input || '\u00a0'; sndFlip(); }
        };
        kb.appendChild(b);
      });
      var del = document.createElement('button'); del.className = 'kb-key del'; del.textContent = '\u232b';
      del.onclick = function() { input = input.slice(0, -1); inpDisp.textContent = input || '\u00a0'; };
      kb.appendChild(del);
      var sub = document.createElement('button'); sub.className = 'kb-key submit'; sub.textContent = 'OK';
      sub.onclick = function() {
        kb.querySelectorAll('.kb-key').forEach(function(x) { x.style.pointerEvents = 'none'; });
        if (input === answer) { score++; sndCorrect(); showFeedback('\u2705'); }
        else { sndWrong(); showFeedback('\u274c'); inpDisp.style.color = 'var(--red)'; inpDisp.textContent = input + ' \u2192 ' + answer; }
        round++; setTimeout(playRound, 1000);
      };
      kb.appendChild(sub);
    }, showTime);
  }

  showInstruction('\u{1f504}', 'Baklengs',
    'Du ser tegn p\u00e5 skjermen. Skriv dem baklengs!',
    function() { playRound(); });
}

  {seq:['3','6','9','12'],ans:'15',alts:['13','14','18'],exp:'Teller opp med 3: 3-gangen — hvert tall øker med 3.'},
  {seq:['\u{1f535}','\u{1f535}','\u{1f534}','\u{1f535}','\u{1f535}','\u{1f534}','\u{1f535}','\u{1f535}'],ans:'\u{1f534}',alts:['\u{1f535}','\u{1f7e2}','\u{1f7e1}'],exp:'Gruppe på tre! To blå + én rød gjentas: A A B · A A B · A A → B'},
  {seq:['10','20','30','40'],ans:'50',alts:['45','60','35'],exp:'Teller opp med 10: Hvert tall øker med 10.'},
  {seq:['\u{1f53a}','\u{1f53b}','\u{1f53a}','\u{1f53b}'],ans:'\u{1f53a}',alts:['\u{1f53b}','\u2b1c','\u{1f532}'],exp:'Annenhver! Opp-trekant og ned-trekant veksler: A B A B → A'},
  {seq:['1','3','5','7'],ans:'9',alts:['8','10','11'],exp:'Teller opp med 2: Oddetall — hvert tall øker med 2.'},
  {seq:['\u{1f308}','\u2600\ufe0f','\u{1f308}','\u2600\ufe0f','\u{1f308}'],ans:'\u2600\ufe0f',alts:['\u{1f308}','\u{1f319}','\u2b50'],exp:'Annenhver! Regnbue og sol veksler: A B A B A → B'},
  {seq:['2','4','8','16'],ans:'32',alts:['20','24','18'],exp:'Dobling! Hvert tall er det dobbelte: 2→4→8→16→32 (×2).'},
  {seq:['\u{1f534}','\u{1f535}','\u{1f7e2}','\u{1f534}','\u{1f535}','\u{1f7e2}'],ans:'\u{1f534}',alts:['\u{1f535}','\u{1f7e2}','\u{1f7e1}'],exp:'Tre farger som gjentas! Rød, blå, grønn: A B C · A B C → A'},
  {seq:['1','4','9','16'],ans:'25',alts:['20','21','36'],exp:'Kvadrattall! 1²=1, 2²=4, 3²=9, 4²=16 → 5²=25'},
  {seq:['\u2744\ufe0f','\u2744\ufe0f','\u2600\ufe0f','\u2600\ufe0f','\u2744\ufe0f','\u2744\ufe0f','\u2600\ufe0f','\u2600\ufe0f'],ans:'\u2744\ufe0f',alts:['\u2600\ufe0f','\u{1f319}','\u{1f308}'],exp:'Par som gjentas! To snøfnugg + to soler: A A B B · A A B B → A'},
  {seq:['100','90','80','70'],ans:'60',alts:['65','50','75'],exp:'Teller ned med 10! Hvert tall minker med 10.'},

  {seq:['1','1','2','3','5'],ans:'8',alts:['6','7','10'],exp:'Fibonacci! Hvert tall er summen av de to forrige: 3+5=8'},

// Extra-hard patterns for Vanskelig mode
var PATTERNS_EXTRA = [
  {seq:['2','3','5','7','11'],ans:'13',alts:['12','14','15'],exp:'Primtall! Tall som bare kan deles på 1 og seg selv: 2, 3, 5, 7, 11 → 13'},
  {seq:['1','3','6','10','15'],ans:'21',alts:['18','20','24'],exp:'Trekanttall! Legg til 2, 3, 4, 5, 6: Tenk trapp — hvert steg blir bredere.'},
  {seq:['1','3','9','27'],ans:'81',alts:['54','64','72'],exp:'Potens av 3! Hvert tall ganges med 3: ×3 hver gang.'},
  {seq:['1','2','4','5','7','8'],ans:'10',alts:['9','11','12'],exp:'Hopp! +1, +2, +1, +2, +1 → +2. Annenhver økning veksler.'},
  {seq:['50','49','47','44','40'],ans:'35',alts:['36','34','38'],exp:'Trekk fra mer og mer! −1, −2, −3, −4 → −5. Differansen øker.'},
  {seq:['1','4','2','5','3','6'],ans:'4',alts:['7','5','8'],exp:'To rekker flettet! Oddetall +1: 1,2,3,4… Partall +1: 4,5,6,7…'},
  {seq:['0','1','1','2','4','7'],ans:'13',alts:['11','12','14'],exp:'Tribonacci! Summen av de tre forrige: 1+2+4=7, 2+4+7=13'},
  {seq:['64','32','16','8','4'],ans:'2',alts:['1','3','0'],exp:'Halvering! Hvert tall deles på 2: ÷2 hver gang.'},
  {seq:['1','2','6','24','120'],ans:'720',alts:['240','600','360'],exp:'Fakultet! 1, 1×2, 2×3, 6×4, 24×5 → 120×6=720. Ganges med neste tall.'},
  {seq:['3','4','7','11','18'],ans:'29',alts:['25','27','36'],exp:'Fibonacci-variant! Summen av de to forrige: 11+18=29'}
];

function startPattern() {
  showGame('M\u00f8nsteret \u{1f3af}', '');
  var round = 0, score = 0, TOTAL = 10;
  // Categorize patterns by difficulty
  var easyIdx = [0,1,2,3,4,13,14,15];
  var medIdx  = [5,6,7,9,10,11,17,20,21,23];
  var hardIdx = [8,12,16,18,19,22];
  // Extra patterns indexed as 24+
  var extraIdx = [];
  for (var ei = 0; ei < PATTERNS_EXTRA.length; ei++) extraIdx.push(24 + ei);
  var pool = [];
  if (currentDiff === 0) {
    // Normal: 3 easy, 4 medium, 3 hard
    pool = pool.concat(shuf(easyIdx).slice(0, 3));
    pool = pool.concat(shuf(medIdx).slice(0, 4));
    pool = pool.concat(shuf(hardIdx).slice(0, 3));
  } else if (currentDiff === 1) {
    // Medium: 1 easy, 3 medium, 4 hard, 2 extra
    pool = pool.concat(shuf(easyIdx).slice(0, 1));
    pool = pool.concat(shuf(medIdx).slice(0, 3));
    pool = pool.concat(shuf(hardIdx).slice(0, 4));
    pool = pool.concat(shuf(extraIdx).slice(0, 2));
  } else {
    // Hard: 0 easy, 2 medium, 3 hard, 5 extra
    pool = pool.concat(shuf(medIdx).slice(0, 2));
    pool = pool.concat(shuf(hardIdx).slice(0, 3));
    pool = pool.concat(shuf(extraIdx).slice(0, 5));
  }
  pool = shuf(pool);

  function playRound() {
    if (round >= TOTAL) {
      var stars = score >= 10 ? 3 : score >= 8 ? 2 : score >= 6 ? 1 : 0;
      setTimeout(function() { showResult('pattern', Math.max(stars, 1), score + '/' + TOTAL + ' riktige'); }, 300);
      return;
    }
    setProgress(round, TOTAL); setScore(score + '/' + round);
    var pidx = pool[round];
    var p = pidx < 24 ? PATTERNS[pidx] : PATTERNS_EXTRA[pidx - 24];
    var a = gArea();
    a.innerHTML = '<p style="text-align:center;font-weight:700;color:var(--cyan-l);margin:0.5rem 0;">Runde ' +
      (round+1) + '/' + TOTAL + '</p>' +
      '<div class="pattern-seq" id="pat-seq"></div>' +
      '<p style="text-align:center;font-weight:700;color:var(--purple-l);margin:0.8rem 0 0.3rem;">Hva er neste?</p>' +
      '<div class="options-grid" id="pat-opts"></div>';

    var seqDiv = document.getElementById('pat-seq');
    p.seq.forEach(function(s) {
      var sp = document.createElement('span'); sp.className = 'pattern-item'; sp.textContent = s;
      seqDiv.appendChild(sp);
    });
    var q = document.createElement('span'); q.className = 'pattern-item pattern-q'; q.textContent = '?';
    seqDiv.appendChild(q);

    var opts = shuf([p.ans].concat(p.alts));
    var og = document.getElementById('pat-opts');
    opts.forEach(function(opt) {
      var b = document.createElement('button'); b.className = 'option-btn';
      b.style.fontSize = 'clamp(1rem,3.5vw,1.5rem)';
      b.textContent = opt;
      b.onclick = function() {
        og.querySelectorAll('.option-btn').forEach(function(x) { x.style.pointerEvents = 'none'; });
        if (opt === p.ans) { score++; b.classList.add('correct'); sndCorrect(); showFeedback('\u2705'); }
        else {
          b.classList.add('wrong'); sndWrong(); showFeedback('\u274c');
          og.querySelectorAll('.option-btn').forEach(function(x) { if (x.textContent === p.ans) x.classList.add('correct'); });
        }
        // Show pattern explanation
        if (p.exp) {
          var expDiv = document.createElement('div');
          expDiv.style.cssText = 'margin:0.7rem auto;max-width:340px;padding:0.6rem 1rem;border-radius:12px;background:rgba(139,92,246,0.18);border:1px solid rgba(139,92,246,0.4);color:var(--purple-l);font-size:clamp(0.82rem,2.5vw,0.95rem);text-align:center;animation:fadeIn .3s;';
          expDiv.innerHTML = '\ud83d\udca1 ' + p.exp;
          og.parentNode.appendChild(expDiv);
        }
        round++; var expDelay = [2200, 2800, 3500][currentDiff]; setTimeout(playRound, expDelay);
      };
      og.appendChild(b);
    });
  }

  showInstruction('\u{1f3af}', 'M\u00f8nsteret',
    'Finn ut hva som er neste i rekken!',
    function() { playRound(); });
}

/* ===== INIT ===== */
showMenu();
</script>
