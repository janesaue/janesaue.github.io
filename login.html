<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logg inn</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    .boks {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      text-align: center;
    }
    input {
      padding: 0.5rem;
      font-size: 1rem;
      margin: 1rem 0;
      width: 200px;
    }
    button {
      padding: 0.5rem 1.5rem;
      font-size: 1rem;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .feil {
      color: red;
      display: none;
    }
  </style>
</head>
<body>
  <div class="boks">
    <h2>Logg inn</h2>
    <form method="POST" action="/api/login">
      <input type="text" name="brukernavn" placeholder="Brukernavn" autocomplete="username" />
      <br>
      <input type="password" name="passord" placeholder="Passord" autocomplete="current-password" />
      <br>
      <button type="submit">Logg inn</button>
    </form>
    <p class="feil" id="feilmelding">Feil brukernavn eller passord – prøv igjen</p>
    <p class="feil" id="utloptmelding" style="color:orange;">Sesjonen din har utløpt – logg inn på nytt</p>
    <p class="feil" id="blokkertmelding">For mange forsøk – prøv igjen om 15 minutter</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    if (params.get("feil") === "1") {
      document.getElementById("feilmelding").style.display = "block";
    }
    if (params.get("utlopt") === "1") {
      document.getElementById("utloptmelding").style.display = "block";
    }
    if (params.get("blokkert") === "1") {
      document.getElementById("blokkertmelding").style.display = "block";
    }
  </script>
</body>
</html>
